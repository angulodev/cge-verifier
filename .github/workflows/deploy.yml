name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Frontend → GitHub Pages ────────────────────────────────────────────────
  frontend:
    name: Frontend → GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Build
        working-directory: frontend
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_WORKER_URL:        ${{ secrets.VITE_WORKER_URL }}
          VITE_SITE_URL:          ${{ secrets.VITE_SITE_URL }}
        run: npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deploy
        uses: actions/deploy-pages@v4

  # ── Worker → Cloudflare ────────────────────────────────────────────────────
  worker:
    name: Worker → Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy worker/index.js --name cge-verifier

      - name: Set secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.SUPABASE_URL }}"      | npx wrangler secret put SUPABASE_URL
          echo "${{ secrets.SUPABASE_ANON_KEY }}" | npx wrangler secret put SUPABASE_ANON_KEY
          echo "${{ secrets.VITE_WORKER_URL }}"   | npx wrangler secret put WORKER_URL
          echo "${{ secrets.MP_ACCESS_TOKEN }}"   | npx wrangler secret put MP_ACCESS_TOKEN
